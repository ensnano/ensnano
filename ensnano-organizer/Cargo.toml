[package]
name = "ensnano_organizer"
version = "0.1.0"
authors = ["nlevy <nicolaspierrelevy@gmail.com>"]
edition = "2018"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
iced = { version = "0.12", features=["advanced"] }
iced_wgpu = "0.12"
iced_graphics = "0.12"
iced_winit = "0.12"
iced_style = "0.12"
iced_aw = { version = "0.8", features=["icons"] }
iced_widget = "0.12"
iced_renderer = "0.12"
serde = "1.0.116"
serde_derive = "1.0.116"
serde_json = "1.0"
log = "0.4"
pretty_env_logger = "0.4"
rand = "0.8.4"

[dev-dependencies]
num_enum = "0.5.1"

