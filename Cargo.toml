[workspace]
members = [
    "ensnano-design",
    "ensnano-exports",
    "ensnano-flatscene",
    "ensnano-gui",
    "ensnano-iced",
    "ensnano-interactor",
    "ensnano-organizer",
    "ensnano-physics",
    "ensnano-utils",
]

[workspace.package]
version = "0.7.0"
authors = [
    "thenlevy <nicolaspierrelevy@gmail.com>",
    "Nicolas Schabanel <nicolas.schabanel@gmail.com>",
    "Joris Picot <joris.picot@ens-lyon.fr>",
    "Pacôme Perrotin <pacome.perrotin@gmail.com>",
]
edition = "2024"
license = "GPL-3.0-or-later"

# Enable max optimizations for dependencies, but not for our code:
[profile.dev.package."*"]
opt-level = 3

[package]
name = "ensnano"
resolver = "2"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true

[workspace.dependencies]
ensnano_design = { path = "ensnano-design" }
ensnano_exports = { path = "ensnano-exports" }
ensnano_flatscene = { path = "ensnano-flatscene" }
ensnano_gui = { path = "ensnano-gui" }
ensnano_iced = { path = "ensnano-iced" }
ensnano_interactor = { path = "ensnano-interactor" }
ensnano_organizer = { path = "ensnano-organizer" }
ensnano_physics = { path = "ensnano-physics" }
ensnano_utils = { path = "ensnano-utils" }

ahash = "0.8.6"
bytemuck = "1.2.0"
chebyshev_polynomials = { git = "https://github.com/thenlevy/chebyshev_polynomials" }
chrono = "0.4"
color_space = "0.5.2"
confy = { version = "1.0.0", default-features = false, features = [
    "yaml_conf",
] }
dirs = "4.0"
fontdue = "0.6.4"
futures = "0.3.5"
futures-channel = "0.3.30"
gltf = "0.16.0"
iced = { version = "0.12", features = ["advanced", "image", "svg"] }
iced_aw = { version = "0.9", default-features = false, features = [
    "tabs",
    "tab_bar",
] }
iced_futures = "0.12"
iced_graphics = "0.12"
iced_runtime = "0.12"
iced_wgpu = "0.12"
iced_widget = "0.12"
iced_winit = "0.12"
icondata = { version = "0.6", default-features = false, features = [
    "bootstrap-icons",
    "material-design-icons",
] }
image = "0.23"
int-enum = "1.0.1"
itertools = "0.10.3"
log = "0.4"
lyon = { git = "https://github.com/nical/lyon", rev = "ea6d904c6c9ec0445c5653c119a48c43ea76cee9" }
mathru = "0.13"
nom_stl = "0.2.2"
num_enum = "0.5.1"
open = "1"
ordered-float = { version = "2.0", features = ["serde"] }
paste = "1.0.5"
pathdiff = "0.2.1"
png = "0.17.5"
pretty_env_logger = "0.4"
quadrature = "0.1.2"
rand = "0.8.5"
rand_distr = "0.4.0"
rapier3d = "0.30.0"
rayon = "1.6.0"
regex = "1.4.2"
relative-path = "1.7.0"
rfd = "0.15"
rust_xlsxwriter = "0.55.0"
serde = { version = "1.0.116", features = ["derive", "rc"] }
serde_json = "1.0.116"
serde_with = "1.11.0"
strum = { version = "0.26", features = ["derive"] }
svg = "0.12.0"
ultraviolet = { git = "https://github.com/termhn/ultraviolet", rev = "b2fb29e", features = [
    "bytemuck",
    "f64",
    "serde",
] }
version-compare = "0.1.0"
wgpu = { version = "0.19", features = ["spirv"] }
winit = "0.29"

[dependencies]
ensnano_design.workspace = true
ensnano_exports.workspace = true
ensnano_flatscene.workspace = true
ensnano_gui.workspace = true
ensnano_iced.workspace = true
ensnano_interactor.workspace = true
ensnano_organizer.workspace = true
ensnano_physics.workspace = true
ensnano_utils.workspace = true

# ensnano_scene specific
bytemuck.workspace = true
futures-channel.workspace = true
image.workspace = true
int-enum.workspace = true
lyon.workspace = true
num_enum.workspace = true
png.workspace = true

ahash.workspace = true
chebyshev_polynomials.workspace = true
color_space.workspace = true
confy.workspace = true
dirs.workspace = true
futures.workspace = true
log.workspace = true
mathru.workspace = true
ordered-float.workspace = true
pretty_env_logger.workspace = true
rand.workspace = true
rand_distr.workspace = true
regex.workspace = true
rfd.workspace = true
rust_xlsxwriter.workspace = true
serde.workspace = true
serde_json.workspace = true
ultraviolet.workspace = true
version-compare.workspace = true
wgpu.workspace = true
winit.workspace = true

[features]
log_after_renderer_setup = []
dx12_only = []
