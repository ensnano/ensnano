[package]
name = "ensnano_gui"
version = "0.4.0"
authors = ["thenlevy <nicolaspierrelevy@gmail.com>"]
edition = "2018"
license = "GPL-3.0-or-later"

[dependencies]
iced = { version = "0.12", features=["image"] }
iced_aw = { version = "0.8", features = ["tab_bar"] }
iced_graphics = "0.12"
iced_runtime = "0.12"
iced_winit = "0.12"
iced_wgpu = "0.12"
iced_widget = "0.12"
wgpu = { version = "0.19", features = ["spirv"] }
ensnano_design = { path = "../ensnano-design" }
ensnano_iced = { path = "../ensnano-iced" }
ensnano_interactor = { path = "../ensnano-interactor" }
ensnano_organizer = { path = "../ensnano-organizer" }
ensnano_utils = { path = "../ensnano-utils" }
ensnano_exports = { path = "../ensnano-exports"}
rfd = "0.4"
futures = "0.3.5"
open = "1"
color_space = "0.5.2"
log = "0.4"
paste = "1.0.5"
serde_derive = "1.0.116"
serde = "1.0.116"
